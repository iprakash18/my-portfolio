<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Prakash Iyyanarappan</title>
    <script>
      // GitHub Pages SPA fallback: redirect 404s to index.html preserving the path.
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem('redirectPath', path);
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
